apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/argoproj/argo-helm'
    path: charts/argo-cd
    targetRevision: argo-cd-7.3.4
    helm:
      # TODO: Use variables
      values: |
        global:
          domain: argocd.multipass.local
        certificate:
          enabled: false
        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            tls: false
        # repoServer:
        #   extraContainers:
        #     - name: argocd-repo-server
        #       image: alpine:3.8
        #       volumeMounts:
        #         - name: custom-tools
        #           mountPath: /usr/local/bin/argocd-vault-plugin
        #           subPath: argocd-vault-plugin
        #   volumes:
        #     - name: custom-tools
        #       emptyDir: {}
        #   initContainers:
        #     - name: download-tools
        #       image: alpine:3.8
        #       command: [sh, -c]
        #       env:
        #         - name: AVP_VERSION
        #           value: "1.16.1"
        #       args:
        #         - >-
        #           wget -O argocd-vault-plugin
        #           https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/v${AVP_VERSION}/argocd-vault-plugin_${AVP_VERSION}_linux_amd64 &&
        #           chmod +x argocd-vault-plugin &&
        #           mv argocd-vault-plugin /custom-tools/
        #       volumeMounts:
        #         - mountPath: /custom-tools
        #           name: custom-tools
        dex:
          enabled: false
        notifications:
          enabled: false
        applicationSet:
          enabled: false
        configs:
          params:
            server.insecure: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-configuration
  namespace: argocd
type: Opaque
data:
  # VAULT_ADDR: vault.multipass.local
  # AVP_AUTH_TYPE: approle
  # AVP_ROLE_ID: 329a178b-1999-4785-b8fa-345142cdace5
  # AVP_SECRET_ID: a8b8f0e5-c6f6-4da5-b8c2-af55a5727304
  VAULT_ADDR: dmF1bHQubXVsdGlwYXNzLmxvY2Fs
  AVP_AUTH_TYPE: YXBwcm9sZQ==
  AVP_ROLE_ID: MzI5YTE3OGItMTk5OS00Nzg1LWI4ZmEtMzQ1MTQyY2RhY2U1
  AVP_SECRET_ID: YThiOGYwZTUtYzZmNi00ZGE1LWI4YzItYWY1NWE1NzI3MzA0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  configManagementPlugins: |
    - name: argocd-vault-plugin
      init:
        command: [sh, -c]
        args: ["echo $$VAULT_ADDR=$$ARGOCD_ENV_VAULT_ADDR; echo $$AVP_AUTH_TYPE=$$ARGOCD_ENV_AVP_AUTH_TYPE; echo $$AVP_ROLE_ID=$$ARGOCD_ENV_AVP_ROLE_ID; echo $$AVP_SECRET_ID=$$ARGOCD_ENV_AVP_SECRET_ID > /etc/secrets/vault-config"]
      generate:
        command: ["argocd-vault-plugin", "generate", "/etc/secrets/vault-config"]
