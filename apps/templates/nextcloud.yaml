---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/nextcloud/helm'
    path: charts/nextcloud
    targetRevision: nextcloud-5.2.0
    helm:
      # TODO: Use variables
      values: |
        persistence:
          enabled: true
          storageClass: "longhorn"
        ingress:
          enabled: true
          className: traefik
        nextcloud:
          host: nextcloud.multipass.local
        externalDatabase:
          enabled: true
          type: postgresql
          database: nextcloud
          user: nextcloud
          password: password
        postgresql:
          enabled: true
          global:
            postgresql:
              auth:
                username: nextcloud
                password: password
                database: nextcloud
          primary:
            persistence:
              enabled: true
              storageClass: longhorn
    plugin:
      name: argocd-vault-plugin
      env:
        - name: HELM_VALUES
          value: |
            nextcloud:
              username: <path:internal/data/nextcloud#username>
              password: <path:internal/data/nextcloud#password>
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
